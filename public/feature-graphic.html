<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>+Fortes — Feature Graphic</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;800&display=swap');

    body {
      width: 1024px;
      height: 500px;
      overflow: hidden;
      font-family: 'Outfit', sans-serif;
    }

    .container {
      width: 1024px;
      height: 500px;
      background: linear-gradient(135deg, #2D6A4F 0%, #1B4332 60%, #081C15 100%);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 80px;
      position: relative;
      overflow: hidden;
    }

    /* Decorative circles */
    .circle {
      position: absolute;
      border-radius: 50%;
      background: rgba(255,255,255,0.04);
    }
    .c1 { width: 400px; height: 400px; top: -100px; right: -50px; }
    .c2 { width: 250px; height: 250px; bottom: -80px; right: 200px; }
    .c3 { width: 180px; height: 180px; top: 50px; left: -60px; }

    .left {
      flex: 1;
      z-index: 1;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 28px;
    }

    .logo-icon {
      width: 48px;
      height: 48px;
      background: rgba(255,255,255,0.15);
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .logo-icon svg {
      width: 24px;
      height: 24px;
    }

    .logo-text {
      font-size: 28px;
      font-weight: 800;
      color: white;
      letter-spacing: -0.5px;
    }

    .tagline {
      font-size: 38px;
      font-weight: 800;
      color: white;
      line-height: 1.15;
      margin-bottom: 16px;
      letter-spacing: -1px;
    }

    .tagline span {
      color: rgba(255,255,255,0.5);
    }

    .subtitle {
      font-size: 16px;
      color: rgba(255,255,255,0.6);
      line-height: 1.5;
      max-width: 340px;
    }

    .badges {
      display: flex;
      gap: 8px;
      margin-top: 24px;
    }

    .badge {
      display: flex;
      align-items: center;
      gap: 6px;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 20px;
      padding: 6px 14px;
      font-size: 12px;
      color: rgba(255,255,255,0.8);
    }

    /* Phone mockup */
    .right {
      position: relative;
      z-index: 1;
    }

    .phone {
      width: 220px;
      height: 440px;
      background: #FAFAF8;
      border-radius: 28px;
      border: 3px solid rgba(255,255,255,0.2);
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      overflow: hidden;
      transform: rotate(3deg);
      padding: 16px;
    }

    .phone-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }

    .phone-greeting {
      font-size: 9px;
      color: #6B7280;
    }

    .phone-title {
      font-size: 14px;
      font-weight: 700;
      color: #1A1A1A;
    }

    .phone-avatar {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: rgba(45,106,79,0.15);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      font-weight: 700;
      color: #2D6A4F;
    }

    .phone-card {
      background: white;
      border: 1px solid #E5E7EB;
      border-radius: 12px;
      padding: 12px;
      margin-bottom: 8px;
    }

    .phone-card.active {
      border-color: #2D6A4F;
      box-shadow: 0 0 0 1px rgba(45,106,79,0.1);
    }

    .phone-card-title {
      font-size: 11px;
      font-weight: 600;
      color: #1A1A1A;
      margin-bottom: 4px;
    }

    .phone-card-badge {
      display: inline-block;
      font-size: 8px;
      background: rgba(45,106,79,0.1);
      color: #2D6A4F;
      padding: 1px 6px;
      border-radius: 8px;
      margin-left: 4px;
    }

    .phone-streak {
      font-size: 9px;
      color: #2D6A4F;
      display: flex;
      align-items: center;
      gap: 3px;
    }

    .phone-streak.muted {
      color: #9CA3AF;
    }

    .flame {
      font-size: 10px;
    }

    .phone-add {
      border: 1px dashed #D1D5DB;
      border-radius: 12px;
      padding: 8px;
      text-align: center;
      font-size: 10px;
      color: #9CA3AF;
    }

    .url {
      position: absolute;
      bottom: 20px;
      left: 80px;
      font-size: 13px;
      color: rgba(255,255,255,0.3);
      letter-spacing: 0.5px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="circle c1"></div>
    <div class="circle c2"></div>
    <div class="circle c3"></div>

    <div class="left">
      <div class="logo">
        <div class="logo-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round">
            <line x1="12" y1="5" x2="12" y2="19"/>
            <line x1="5" y1="12" x2="19" y2="12"/>
          </svg>
        </div>
        <span class="logo-text">Fortes</span>
      </div>

      <div class="tagline">
        +Forte<br>a cada dia<span>.</span>
      </div>

      <div class="subtitle">
        Acompanhe sua jornada de mudança com rede de apoio, streaks e conquistas.
      </div>

      <div class="badges">
        <div class="badge">🔥 Streaks</div>
        <div class="badge">🏆 Conquistas</div>
        <div class="badge">💚 Rede de apoio</div>
      </div>
    </div>

    <div class="right">
      <div class="phone">
        <div class="phone-header">
          <div>
            <div class="phone-greeting">Oi, Wilder</div>
            <div class="phone-title">Como vai hoje?</div>
          </div>
          <div class="phone-avatar">W</div>
        </div>

        <div class="phone-card active">
          <div class="phone-card-title">
            Emagrecer
            <span class="phone-card-badge">feito</span>
          </div>
          <div class="phone-streak">
            <span class="flame">🔥</span> 12 dias
          </div>
        </div>

        <div class="phone-card">
          <div class="phone-card-title">Parar de beber</div>
          <div class="phone-streak">
            <span class="flame">🔥</span> 2 dias
          </div>
        </div>

        <div class="phone-card">
          <div class="phone-card-title">Treinar</div>
          <div class="phone-streak muted">
            <span class="flame">🔥</span> 0 dias
          </div>
        </div>

        <div class="phone-add">+ Nova meta</div>
      </div>
    </div>

    <div class="url">maisfortes.com.br</div>
  </div>
</body>
</html>
